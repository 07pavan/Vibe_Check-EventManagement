# render.yaml — GoAttend deployment configuration
#
# This file is the single source of truth for Render deployment.
# Commit it to git. Render reads it automatically on each push.
#
# Variables marked sync: false MUST be set manually in the Render dashboard:
#   Dashboard → Your Service → Environment → Add Environment Variable
#
# Variables marked generateValue: true are auto-generated by Render on first deploy.

services:
  - type: web
    name: eventmanagement-api
    region: singapore
    plan: free
    runtime: python

    # Build: install deps + collect static files into staticfiles/
    # WhiteNoise will serve these — no separate static file server needed.
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput

    # Pre-deploy: run migrations BEFORE the new instance goes live.
    # This ensures the DB schema is always ahead of the code — safe for
    # zero-downtime deploys. Render runs this as a one-off job.
    preDeployCommand: python manage.py migrate --noinput

    # Start: Gunicorn with 2 workers.
    # --bind 0.0.0.0:$PORT  — Render injects $PORT dynamically
    # --workers 2           — Free tier has 512MB RAM; 2 workers is the max safe value
    # --timeout 120         — Prevents worker timeouts on cold-start DB connections
    # --log-file -          — Log to stdout (captured by Render's log dashboard)
    # --access-logfile -    — Log every HTTP request to stdout
    startCommand: >-
      gunicorn core.wsgi:application
      --bind 0.0.0.0:$PORT
      --workers 2
      --timeout 120
      --log-file -
      --access-logfile -

    # Render pings this after deploy to confirm the service is alive.
    # Must return HTTP 200. Our /health/ view does exactly that.
    healthCheckPath: /health/

    envVars:
      # ── Django ─────────────────────────────────────────────────────────
      - key: DJANGO_SETTINGS_MODULE
        value: core.settings

      - key: DEBUG
        value: "False"

      - key: DJANGO_ENV
        value: production

      - key: PYTHON_VERSION
        value: "3.12.3"

      # Auto-generated by Render — cryptographically secure 50-char string.
      # Render rotates this on each new deployment if generateValue is set.
      - key: SECRET_KEY
        generateValue: true

      # Your Render service URL — update after first deploy
      - key: ALLOWED_HOSTS
        value: "eventmanagement-api1.onrender.com,localhost,127.0.0.1"

      # ── Database (Neon.tech) ───────────────────────────────────────────
      # Set manually: Neon Dashboard → Connection Details → Connection String
      # Format: postgresql://user:pass@ep-xxx.us-east-2.aws.neon.tech/neondb?sslmode=require
      - key: DATABASE_URL
        sync: false

      # ── Cloudinary (Media Storage) ────────────────────────────────────
      # Set manually: Cloudinary Console → Dashboard → API Environment Variable
      # Format: cloudinary://API_KEY:API_SECRET@CLOUD_NAME
      - key: CLOUDINARY_URL
        sync: false

      # ── CORS / CSRF ───────────────────────────────────────────────────
      - key: CORS_ALLOWED_ORIGINS
        value: "https://go-attend.vercel.app,https://event-management-sys-pi.vercel.app"

      - key: CSRF_TRUSTED_ORIGINS
        value: "https://go-attend.vercel.app,https://event-management-sys-pi.vercel.app,https://eventmanagement-api1.onrender.com"
