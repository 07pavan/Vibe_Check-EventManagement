<!DOCTYPE html>
<html lang="en" class="light">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Login — GoAttend</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700;800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms"></script>
<script>tailwind.config={theme:{extend:{colors:{"primary":"#630ed4","primary-container":"#7c3aed","on-primary":"#ffffff","on-primary-container":"#ede0ff","surface":"#fef7ff","on-surface":"#1d1a24","surface-variant":"#e8dfee","on-surface-variant":"#4a4455","outline":"#7b7487","outline-variant":"#ccc3d8","background":"#fef7ff","error":"#ba1a1a"},spacing:{"xs":"4px","sm":"8px","md":"16px","lg":"24px","xl":"48px","gutter":"16px","margin-mobile":"20px"},borderRadius:{DEFAULT:"1rem",lg:"2rem",full:"9999px"},fontSize:{"display-xl":["48px",{lineHeight:"1.1",letterSpacing:"-0.02em",fontWeight:"800"}],"headline-md":["24px",{lineHeight:"1.3",fontWeight:"700"}],"body-md":["16px",{lineHeight:"1.5",fontWeight:"400"}],"label-caps":["12px",{lineHeight:"1.0",letterSpacing:"0.05em",fontWeight:"600"}]}}}}</script>
<style>.material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24}body{font-family:'Inter',sans-serif;background:#fef7ff}.brand-logo{font-family:'Space Grotesk',sans-serif;font-weight:800;letter-spacing:-0.03em}</style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center px-6 bg-gradient-to-br from-[#fef7ff] to-[#f3ebfa]">
<div class="w-full max-w-sm">
  <div class="text-center mb-8">
    <h1 class="brand-logo text-display-xl font-extrabold text-primary tracking-tighter">GoAttend</h1>
    <p class="text-on-surface-variant text-body-md mt-1">Sign in to discover events</p>
  </div>
  <div class="bg-white rounded-lg p-8 shadow-[0_8px_40px_rgba(124,58,237,0.12)] border border-outline-variant/30">
    <div id="err" class="hidden mb-4 p-3 bg-red-50 border border-red-200 text-red-700 rounded-lg text-sm"></div>
    <div class="mb-4">
      <label class="block text-label-caps text-on-surface-variant mb-2">USERNAME</label>
      <input id="username" type="text" placeholder="your_username"
        class="w-full px-4 py-3 border border-outline-variant rounded-xl bg-white text-on-surface focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary transition-all text-body-md"/>
    </div>
    <div class="mb-6">
      <label class="block text-label-caps text-on-surface-variant mb-2">PASSWORD</label>
      <input id="password" type="password" placeholder="••••••••"
        class="w-full px-4 py-3 border border-outline-variant rounded-xl bg-white text-on-surface focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary transition-all text-body-md"/>
    </div>
    <button onclick="doLogin()" id="btn"
      class="w-full bg-primary text-on-primary py-4 rounded-full font-bold text-label-caps tracking-wider shadow-lg shadow-primary/25 active:scale-95 transition-all hover:opacity-90">
      SIGN IN
    </button>
    <p class="text-center mt-4 text-sm text-on-surface-variant">
      No account? <a href="register.html" class="text-primary font-semibold">Register</a>
    </p>
  </div>
</div>
<script src="config.js"></script>
<script src="api.js"></script>
<script>
  if (isLoggedIn()) window.location.href = 'index.html';
  document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
  async function doLogin() {
    const btn = document.getElementById('btn');
    const err = document.getElementById('err');
    err.classList.add('hidden');
    btn.textContent = 'SIGNING IN…'; btn.disabled = true;
    try {
      const profile = await login(document.getElementById('username').value.trim(), document.getElementById('password').value);
      window.location.href = profile.role === 'organizer' ? 'organizer.html' : 'index.html';
    } catch(e) {
      err.textContent = e.detail || 'Invalid username or password.';
      err.classList.remove('hidden');
    } finally { btn.textContent = 'SIGN IN'; btn.disabled = false; }
  }
</script>
</body></html>
