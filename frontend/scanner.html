<!DOCTYPE html>
<html lang="en" class="light">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ticket Scanner — GoAttend</title>
<meta name="description" content="Organizer QR code ticket scanner for GoAttend events."/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700;800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<script>
tailwind.config = {
  darkMode: "class",
  theme: { extend: {
    colors: {
      "primary":"#630ed4","primary-container":"#7c3aed","on-primary":"#ffffff",
      "secondary":"#00687a","on-secondary":"#ffffff",
      "tertiary":"#7d3d00","on-tertiary":"#ffffff",
      "surface":"#fef7ff","surface-container":"#f3ebfa","surface-container-low":"#f9f1ff",
      "surface-variant":"#e8dfee","on-surface":"#1d1a24","on-surface-variant":"#4a4455",
      "outline":"#7b7487","outline-variant":"#ccc3d8",
      "error":"#ba1a1a","error-container":"#ffdad6",
      "background":"#fef7ff"
    },
    borderRadius: { DEFAULT:"1rem", lg:"2rem", full:"9999px" },
    spacing: { xs:"4px",sm:"8px",md:"16px",lg:"24px",xl:"48px",gutter:"16px","margin-mobile":"20px" },
    fontSize: {
      "display-xl":["48px",{lineHeight:"1.1",letterSpacing:"-0.02em",fontWeight:"800"}],
      "headline-md":["24px",{lineHeight:"1.3",fontWeight:"700"}],
      "body-md":["16px",{lineHeight:"1.5",fontWeight:"400"}],
      "label-caps":["12px",{lineHeight:"1.0",letterSpacing:"0.05em",fontWeight:"600"}]
    }
  }}
}
</script>
<style>
.material-symbols-outlined { font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24; }
body { font-family:'Inter',sans-serif; background:#0f0a1e; min-height:100dvh; }
.brand-logo { font-family:'Space Grotesk',sans-serif; font-weight:800; letter-spacing:-0.03em; }
.glass { background:rgba(255,255,255,.06); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px); border:1px solid rgba(255,255,255,.12); }
.glass-result { backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px); }
.scanner-frame { position:relative; }
.scanner-frame::before, .scanner-frame::after,
.scanner-frame > span::before, .scanner-frame > span::after {
  content:''; position:absolute; width:28px; height:28px; border-color:#7c3aed; border-style:solid;
}
.scanner-frame::before  { top:0;    left:0;  border-width:3px 0 0 3px; border-radius:4px 0 0 0; }
.scanner-frame::after   { top:0;    right:0; border-width:3px 3px 0 0; border-radius:0 4px 0 0; }
.scanner-frame > span::before { bottom:0; left:0;  border-width:0 0 3px 3px; border-radius:0 0 0 4px; }
.scanner-frame > span::after  { bottom:0; right:0; border-width:0 3px 3px 0; border-radius:0 0 4px 0; }
@keyframes scan-line {
  0%   { transform:translateY(0);      opacity:1; }
  90%  { transform:translateY(220px);  opacity:1; }
  100% { transform:translateY(220px);  opacity:0; }
}
.scan-beam { animation:scan-line 2.4s ease-in-out infinite; }
@keyframes pulse-ring {
  0%   { transform:scale(1);    opacity:.6; }
  100% { transform:scale(1.35); opacity:0; }
}
.pulse-ring { animation:pulse-ring 1.2s ease-out infinite; }
#qr-reader video { border-radius:.75rem; }
#qr-reader { border:none !important; }

/* Result card states */
.result-granted  { background:rgba(16,185,129,.15); border:1px solid rgba(16,185,129,.4); }
.result-error    { background:rgba(239,68,68,.15);  border:1px solid rgba(239,68,68,.4);  }
.result-warning  { background:rgba(251,191,36,.15); border:1px solid rgba(251,191,36,.4); }
</style>
</head>
<body class="text-white">

<!-- Ambient blobs -->
<div class="fixed inset-0 z-0 pointer-events-none overflow-hidden">
  <div class="absolute -top-40 -left-40 w-96 h-96 bg-primary/30 rounded-full blur-[100px]"></div>
  <div class="absolute -bottom-40 -right-40 w-96 h-96 bg-secondary/20 rounded-full blur-[100px]"></div>
</div>

<!-- Auth gate — shown while checking -->
<div id="auth-gate" class="fixed inset-0 z-50 flex flex-col items-center justify-center bg-[#0f0a1e]">
  <div class="w-16 h-16 border-4 border-primary/30 border-t-primary rounded-full animate-spin mb-6"></div>
  <p class="text-white/60 text-body-md">Verifying organizer access…</p>
</div>

<!-- Main Content -->
<div id="app" class="hidden relative z-10 min-h-dvh flex flex-col">

  <!-- Header -->
  <header class="flex items-center justify-between px-margin-mobile h-16 glass border-b border-white/10">
    <a href="index.html" class="text-white/60 hover:text-white transition-colors active:scale-95">
      <span class="material-symbols-outlined">arrow_back</span>
    </a>
    <div class="text-center">
      <h1 class="brand-logo font-extrabold tracking-tighter text-primary text-xl">GoAttend</h1>
      <p class="text-[10px] text-white/40 -mt-1 tracking-widest uppercase">Ticket Scanner</p>
    </div>
    <button onclick="doLogout()" class="text-white/60 hover:text-red-400 transition-colors active:scale-95" title="Sign Out">
      <span class="material-symbols-outlined">logout</span>
    </button>
  </header>

  <!-- Organizer badge -->
  <div id="organizer-badge" class="mx-margin-mobile mt-lg glass rounded-xl px-md py-sm flex items-center gap-sm">
    <div class="w-8 h-8 bg-primary/20 rounded-full flex items-center justify-center">
      <span class="material-symbols-outlined text-primary text-[18px]" style="font-variation-settings:'FILL' 1">verified</span>
    </div>
    <div>
      <p class="text-label-caps text-white/40">SCANNING AS</p>
      <p id="organizer-name" class="font-bold text-white text-sm leading-tight">—</p>
    </div>
    <div class="ml-auto">
      <span class="text-label-caps bg-primary/20 text-primary px-sm py-xs rounded-full border border-primary/30">ORGANIZER</span>
    </div>
  </div>

  <!-- Scanner Section -->
  <main class="flex-1 px-margin-mobile py-lg flex flex-col gap-lg">

    <!-- Camera view -->
    <div class="scanner-frame glass rounded-xl overflow-hidden" id="scanner-wrap">
      <span></span><!-- corner targets -->

      <!-- QR Reader container -->
      <div id="qr-reader" class="w-full" style="min-height:260px"></div>

      <!-- Scan beam overlay -->
      <div id="scan-beam-wrap" class="absolute inset-0 pointer-events-none flex flex-col justify-start pt-2 px-2">
        <div class="scan-beam h-0.5 w-full bg-gradient-to-r from-transparent via-primary to-transparent opacity-80 rounded-full"></div>
      </div>

      <!-- Camera status -->
      <div id="camera-status" class="absolute bottom-0 inset-x-0 px-md py-sm glass border-t border-white/10 flex items-center gap-sm">
        <div class="w-2 h-2 rounded-full bg-green-400 pulse-ring"></div>
        <p id="status-text" class="text-label-caps text-white/60">Camera active — scanning for QR code…</p>
      </div>
    </div>

    <!-- Manual entry -->
    <div class="glass rounded-xl p-md">
      <p class="text-label-caps text-white/40 mb-sm">MANUAL ENTRY</p>
      <div class="flex gap-sm">
        <input id="manual-hash" type="text" placeholder="Paste ticket hash…"
          class="flex-1 bg-white/5 border border-white/10 rounded-xl px-md py-sm text-white text-body-md placeholder:text-white/30 focus:outline-none focus:border-primary/50 transition-colors"/>
        <button onclick="manualVerify()" class="bg-primary text-white px-md py-sm rounded-xl font-bold text-label-caps hover:bg-primary/90 active:scale-95 transition-all">
          VERIFY
        </button>
      </div>
    </div>

    <!-- Result Card -->
    <div id="result-card" class="hidden glass-result rounded-xl p-lg transition-all duration-300">
      <div class="flex items-start gap-md">
        <div id="result-icon-wrap" class="w-12 h-12 rounded-full flex items-center justify-center shrink-0">
          <span id="result-icon" class="material-symbols-outlined text-2xl" style="font-variation-settings:'FILL' 1">check_circle</span>
        </div>
        <div class="flex-1 min-w-0">
          <p id="result-status" class="font-extrabold text-lg leading-tight mb-xs"></p>
          <p id="result-message" class="text-sm text-white/70 mb-md"></p>
          <div id="result-fields" class="space-y-xs"></div>
        </div>
      </div>
      <button onclick="dismissResult()" class="mt-md w-full py-sm rounded-xl border border-white/20 text-label-caps text-white/60 hover:text-white hover:border-white/40 transition-colors active:scale-95">
        SCAN NEXT TICKET
      </button>
    </div>

    <!-- Scan history -->
    <div>
      <div class="flex items-center justify-between mb-md">
        <p class="text-label-caps text-white/40">SCAN HISTORY</p>
        <button onclick="clearHistory()" class="text-label-caps text-primary/60 hover:text-primary transition-colors">CLEAR</button>
      </div>
      <div id="scan-history" class="space-y-sm max-h-64 overflow-y-auto">
        <p class="text-sm text-white/30 text-center py-4">No scans yet</p>
      </div>
    </div>

  </main>
</div>

<script src="config.js"></script>
<script src="api.js"></script>
<script>
// ── State ────────────────────────────────────────────────────────────────
let isProcessing = false;
let scanner = null;
let scanHistory = [];

// ── Boot: verify organizer access ─────────────────────────────────────────
window.addEventListener('DOMContentLoaded', async () => {
  if (!isLoggedIn()) {
    redirect('Not signed in. Please log in as an organizer.');
    return;
  }
  try {
    const data = await checkIsOrganizer();
    document.getElementById('organizer-name').textContent = `${data.username} (${data.email})`;
    document.getElementById('auth-gate').classList.add('hidden');
    document.getElementById('app').classList.remove('hidden');
    startScanner();
  } catch (err) {
    const msg = err?.detail || 'You must be an organizer to access the scanner.';
    redirect(msg);
  }
});

function redirect(msg) {
  window.location.href = `login.html?error=${encodeURIComponent(msg)}`;
}

// ── QR Scanner ─────────────────────────────────────────────────────────────
function startScanner() {
  scanner = new Html5Qrcode('qr-reader');
  scanner.start(
    { facingMode: 'environment' },
    { fps: 10, qrbox: { width: 240, height: 240 }, aspectRatio: 1.0 },
    onQrSuccess,
    () => {}  // silent frame errors
  ).catch(() => {
    document.getElementById('status-text').textContent = 'Camera access denied — use manual entry below.';
    document.getElementById('scan-beam-wrap').classList.add('hidden');
  });
}

async function onQrSuccess(hash) {
  if (isProcessing) return;
  isProcessing = true;
  document.getElementById('status-text').textContent = 'QR detected — verifying…';
  await processHash(hash);
  setTimeout(() => {
    isProcessing = false;
    document.getElementById('status-text').textContent = 'Camera active — scanning for QR code…';
  }, 3500);
}

async function manualVerify() {
  const hash = document.getElementById('manual-hash').value.trim();
  if (!hash) return;
  if (isProcessing) return;
  isProcessing = true;
  await processHash(hash);
  document.getElementById('manual-hash').value = '';
  isProcessing = false;
}

// ── Core verify logic ──────────────────────────────────────────────────────
async function processHash(hash) {
  try {
    const data = await verifyTicket(hash);
    showResult('granted', data);
    addHistory('granted', data);
  } catch (err) {
    if (err?.status === 'error') {
      const isAlreadyScanned = err.message?.toLowerCase().includes('already');
      showResult(isAlreadyScanned ? 'warning' : 'denied', err);
      addHistory(isAlreadyScanned ? 'warning' : 'denied', err);
    } else {
      showResult('denied', { message: err?.detail || 'Verification failed. Try again.' });
    }
  }
}

// ── Result UI ──────────────────────────────────────────────────────────────
function showResult(type, data) {
  const card    = document.getElementById('result-card');
  const wrap    = document.getElementById('result-icon-wrap');
  const icon    = document.getElementById('result-icon');
  const statusEl = document.getElementById('result-status');
  const msgEl   = document.getElementById('result-message');
  const fields  = document.getElementById('result-fields');

  card.className = 'glass-result rounded-xl p-lg transition-all duration-300 ';
  wrap.className = 'w-12 h-12 rounded-full flex items-center justify-center shrink-0 ';

  if (type === 'granted') {
    card.className  += 'result-granted';
    wrap.className  += 'bg-green-500/20';
    icon.textContent = 'check_circle';
    icon.className   = 'material-symbols-outlined text-2xl text-green-400';
    statusEl.textContent = '✅ Access Granted';
    statusEl.className   = 'font-extrabold text-lg leading-tight mb-xs text-green-400';
    msgEl.textContent    = data.message || 'Ticket is valid. Welcome!';
    const t = data.ticket;
    fields.innerHTML = t ? `
      ${field('Event',    t.event?.title         || '—')}
      ${field('Attendee', t.attendee_name         || '—')}
      ${field('Email',    t.attendee_email        || '—')}
      ${field('Venue',    t.event?.venue_name     || '—')}
      ${field('Paid',     t.price_paid ? '₹' + parseFloat(t.price_paid).toFixed(0) : '—')}
    ` : '';
  } else if (type === 'warning') {
    card.className  += 'result-warning';
    wrap.className  += 'bg-yellow-500/20';
    icon.textContent = 'warning';
    icon.className   = 'material-symbols-outlined text-2xl text-yellow-400';
    statusEl.textContent = '⚠️ Already Scanned';
    statusEl.className   = 'font-extrabold text-lg leading-tight mb-xs text-yellow-400';
    msgEl.textContent    = data.message || 'This ticket was already used.';
    fields.innerHTML = `
      ${data.attendee ? field('Attendee', data.attendee) : ''}
      ${data.event    ? field('Event',    data.event) : ''}
      ${data.scanned_at ? field('Scanned At', new Date(data.scanned_at).toLocaleString()) : ''}
    `;
  } else {
    card.className  += 'result-error';
    wrap.className  += 'bg-red-500/20';
    icon.textContent = 'cancel';
    icon.className   = 'material-symbols-outlined text-2xl text-red-400';
    statusEl.textContent = '❌ Access Denied';
    statusEl.className   = 'font-extrabold text-lg leading-tight mb-xs text-red-400';
    msgEl.textContent    = data.message || data.detail || 'Ticket not found or invalid.';
    fields.innerHTML = '';
  }

  card.classList.remove('hidden');
}

function field(label, value) {
  return `<div class="flex justify-between items-center py-xs border-b border-white/10">
    <span class="text-label-caps text-white/40">${label}</span>
    <span class="text-sm font-semibold text-white truncate max-w-[200px]">${value}</span>
  </div>`;
}

function dismissResult() {
  document.getElementById('result-card').classList.add('hidden');
}

// ── Scan History ───────────────────────────────────────────────────────────
function addHistory(type, data) {
  const label = type === 'granted' ? '✅' : type === 'warning' ? '⚠️' : '❌';
  const title = data.ticket?.event?.title || data.event || data.message || 'Unknown';
  const time  = new Date().toLocaleTimeString();
  const colors = { granted:'text-green-400', warning:'text-yellow-400', denied:'text-red-400' };

  scanHistory.unshift({ type, label, title, time });
  if (scanHistory.length > 20) scanHistory.pop();

  const container = document.getElementById('scan-history');
  container.innerHTML = scanHistory.map(s => `
    <div class="glass rounded-xl px-md py-sm flex items-center justify-between gap-sm">
      <span class="text-lg">${s.label}</span>
      <span class="flex-1 text-sm ${colors[s.type]} truncate">${s.title}</span>
      <span class="text-label-caps text-white/30 shrink-0">${s.time}</span>
    </div>`).join('');
}

function clearHistory() {
  scanHistory = [];
  document.getElementById('scan-history').innerHTML = '<p class="text-sm text-white/30 text-center py-4">No scans yet</p>';
}

// ── Logout ─────────────────────────────────────────────────────────────────
async function doLogout() {
  if (scanner) { try { await scanner.stop(); } catch {} }
  await logout();
}
</script>
</body>
</html>
