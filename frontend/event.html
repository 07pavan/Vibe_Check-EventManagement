<!DOCTYPE html>
<html lang="en" class="light">
<head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Event Details — VIBE CHECK</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms"></script>
<script>tailwind.config={theme:{extend:{colors:{"primary":"#630ed4","primary-container":"#7c3aed","on-primary":"#ffffff","on-primary-container":"#ede0ff","surface":"#fef7ff","surface-container-low":"#f9f1ff","surface-container-high":"#ede5f4","surface-container-highest":"#e8dfee","on-surface":"#1d1a24","on-surface-variant":"#4a4455","outline":"#7b7487","outline-variant":"#ccc3d8","background":"#fef7ff","error":"#ba1a1a","error-container":"#ffdad6","on-error":"#ffffff","secondary":"#00687a","inverse-surface":"#332f39"},spacing:{"xs":"4px","sm":"8px","md":"16px","lg":"24px","xl":"48px","gutter":"16px","margin-mobile":"20px"},borderRadius:{DEFAULT:"1rem",lg:"2rem",full:"9999px"},fontSize:{"display-xl":["48px",{lineHeight:"1.1",letterSpacing:"-0.02em",fontWeight:"800"}],"headline-lg":["32px",{lineHeight:"1.2",letterSpacing:"-0.01em",fontWeight:"700"}],"headline-md":["24px",{lineHeight:"1.3",fontWeight:"700"}],"body-md":["16px",{lineHeight:"1.5",fontWeight:"400"}],"body-lg":["18px",{lineHeight:"1.6",fontWeight:"400"}],"label-caps":["12px",{lineHeight:"1.0",letterSpacing:"0.05em",fontWeight:"600"}]}}}}</script>
<style>.material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24}body{font-family:'Inter',sans-serif;background:#fef7ff}</style>
</head>
<body class="text-on-surface mb-36">
<!-- Header -->
<header class="fixed top-0 w-full z-50 bg-surface/90 backdrop-blur-xl flex justify-between items-center px-margin-mobile h-16 border-b border-outline-variant/20">
  <button onclick="history.back()" class="text-primary active:scale-95 transition-transform">
    <span class="material-symbols-outlined">arrow_back</span>
  </button>
  <h1 class="font-extrabold tracking-tighter text-primary text-xl">VIBE CHECK</h1>
  <button onclick="shareEvent()" class="text-primary active:scale-95 transition-transform">
    <span class="material-symbols-outlined">share</span>
  </button>
</header>

<main class="pt-16">
  <!-- Loading skeleton -->
  <div id="skeleton">
    <div style="background:linear-gradient(90deg,#f0e6ff 25%,#e8dfee 50%,#f0e6ff 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;height:280px"></div>
    <style>@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}</style>
    <div class="px-margin-mobile mt-4 space-y-3">
      <div class="h-8 rounded-lg" style="background:#f0e6ff;width:60%"></div>
      <div class="h-5 rounded-lg" style="background:#f0e6ff;width:40%"></div>
      <div class="h-24 rounded-xl" style="background:#f0e6ff"></div>
    </div>
  </div>
  <div id="content" class="hidden"></div>
  <div id="err-msg" class="hidden px-margin-mobile py-16 text-center text-error">Event not found.</div>
</main>

<!-- Sticky Buy Button -->
<div id="buy-bar" class="hidden fixed bottom-0 left-0 w-full z-50 px-margin-mobile pb-6 pt-4 bg-surface/95 backdrop-blur-xl border-t border-outline-variant/20">
  <div class="flex items-center justify-between mb-3">
    <div>
      <p class="text-label-caps text-on-surface-variant">TICKET PRICE</p>
      <p class="text-headline-md font-bold text-primary" id="buy-price">—</p>
    </div>
    <p class="text-label-caps font-semibold" id="tickets-left-label"></p>
  </div>
  <button id="buy-btn" onclick="handleBuy()"
    class="w-full bg-primary text-on-primary py-4 rounded-full font-bold text-label-caps tracking-wider shadow-lg shadow-primary/25 active:scale-95 transition-all hover:opacity-90 disabled:opacity-50">
    GET TICKET
  </button>
  <p id="buy-status" class="text-center text-sm mt-2 text-on-surface-variant hidden"></p>
</div>

<!-- Success Modal -->
<div id="modal" class="hidden fixed inset-0 z-[100] flex items-center justify-center bg-black/50 backdrop-blur-sm p-6">
  <div class="bg-surface w-full max-w-sm rounded-lg p-xl flex flex-col items-center text-center shadow-2xl">
    <div class="w-20 h-20 bg-green-100 rounded-full flex items-center justify-center mb-lg">
      <span class="material-symbols-outlined text-green-600 text-5xl" style="font-variation-settings:'FILL' 1">check_circle</span>
    </div>
    <h3 class="text-headline-md font-bold mb-sm">Ticket Confirmed! 🎉</h3>
    <p class="text-on-surface-variant text-body-md mb-lg" id="modal-msg"></p>
    <button onclick="window.location.href='tickets.html'" class="w-full bg-primary text-on-primary py-3 rounded-full font-bold mb-sm active:scale-95 transition-all">VIEW MY TICKETS</button>
    <button onclick="document.getElementById('modal').classList.add('hidden')" class="w-full text-on-surface-variant py-2 font-semibold">Close</button>
  </div>
</div>

<!-- Error Modal -->
<div id="err-modal" class="hidden fixed inset-0 z-[100] flex items-center justify-center bg-black/50 backdrop-blur-sm p-6">
  <div class="bg-surface w-full max-w-sm rounded-lg p-xl flex flex-col items-center text-center shadow-2xl">
    <div class="w-20 h-20 bg-red-100 rounded-full flex items-center justify-center mb-lg">
      <span class="material-symbols-outlined text-red-600 text-5xl">error</span>
    </div>
    <h3 class="text-headline-md font-bold mb-sm">Purchase Failed</h3>
    <p class="text-on-surface-variant text-body-md mb-lg" id="err-modal-msg"></p>
    <button onclick="document.getElementById('err-modal').classList.add('hidden')" class="w-full bg-primary text-on-primary py-3 rounded-full font-bold active:scale-95 transition-all">OK</button>
  </div>
</div>

<script src="api.js"></script>
<script>
const PLACEHOLDER = 'https://lh3.googleusercontent.com/aida-public/AB6AXuBBG0kETVkyKmuooroSqWkqUKcaDZjoUS446cKpcRrRBQoMUtbw8EgGnXqVe8fTqIWuGOHGJQlyx6Y1yoMQ0kM3GNKRnsoU4gQqMVfEswZ7Cp2tyrV2eyiVdN0b3MkbP9p7T7STCiMh_PqsWcYYK0Q55EXcRAtKXe3Rn2-kjEI8unDAKB7ui5SCRNch9rIOJ-6ug1jlhYkMk3mZ9NsRQ3ZdzjOIncfg4JBH1NRg7OMERIGdPX3UljTD8DDXr8otuRPzv6F-6ImKBYo';
const EMOJI = { music:'🎵', tech:'💻', food:'🍜', arts:'🎨' };
let eventData = null;
const eventId = new URLSearchParams(location.search).get('id');

window.addEventListener('DOMContentLoaded', async () => {
  if (!eventId) { showErr(); return; }
  try {
    eventData = await fetchEvent(eventId);
    renderEvent(eventData);
  } catch { showErr(); }
});

function showErr() {
  document.getElementById('skeleton').classList.add('hidden');
  document.getElementById('err-msg').classList.remove('hidden');
}

function renderEvent(ev) {
  document.title = ev.title + ' — VIBE CHECK';
  document.getElementById('skeleton').classList.add('hidden');
  const sold = ev.tickets_remaining === 0;
  document.getElementById('content').innerHTML = `
    <section class="relative w-full aspect-[4/3] md:aspect-[21/9] overflow-hidden">
      <img src="${ev.image || PLACEHOLDER}" alt="${ev.title}" class="w-full h-full object-cover" onerror="this.src='${PLACEHOLDER}'"/>
      <div class="absolute inset-0 bg-gradient-to-t from-background via-transparent to-transparent"></div>
    </section>
    <section class="px-margin-mobile -mt-10 relative z-10">
      <div class="bg-surface p-lg rounded-lg shadow-[0_4px_24px_rgba(124,58,237,0.12)] border border-outline-variant/30">
        <div class="flex flex-wrap gap-sm mb-md">
          <span class="bg-primary/10 text-primary text-label-caps px-sm py-xs rounded-full">${EMOJI[ev.category] || '🎉'} ${ev.category_display}</span>
          ${sold ? '<span class="bg-red-100 text-red-700 text-label-caps px-sm py-xs rounded-full">SOLD OUT</span>' : `<span class="bg-green-100 text-green-700 text-label-caps px-sm py-xs rounded-full">${ev.tickets_remaining} TICKETS LEFT</span>`}
        </div>
        <h2 class="text-headline-lg font-bold mb-md">${ev.title}</h2>
        <div class="space-y-md">
          <div class="flex items-center gap-md">
            <div class="w-10 h-10 rounded-full bg-surface-container-high flex items-center justify-center text-primary">
              <span class="material-symbols-outlined">calendar_today</span>
            </div>
            <div>
              <p class="text-label-caps text-on-surface-variant">DATE &amp; TIME</p>
              <p class="font-bold text-body-lg">${fmtDate(ev.date)}</p>
            </div>
          </div>
          <div class="flex items-center gap-md">
            <div class="w-10 h-10 rounded-full bg-surface-container-high flex items-center justify-center text-primary">
              <span class="material-symbols-outlined">location_on</span>
            </div>
            <div>
              <p class="text-label-caps text-on-surface-variant">VENUE</p>
              <p class="font-bold text-body-lg">${ev.venue_name}</p>
            </div>
          </div>
          <div class="flex items-center gap-md">
            <div class="w-10 h-10 rounded-full bg-surface-container-high flex items-center justify-center text-primary">
              <span class="material-symbols-outlined">person</span>
            </div>
            <div>
              <p class="text-label-caps text-on-surface-variant">ORGANIZER</p>
              <p class="font-bold text-body-lg">${ev.organizer.username}</p>
            </div>
          </div>
        </div>
      </div>
    </section>
    <section class="px-margin-mobile py-xl">
      <h3 class="text-headline-md font-bold mb-md">About This Event</h3>
      <p class="text-body-lg text-on-surface-variant leading-relaxed">${ev.description}</p>
      <div class="mt-lg grid grid-cols-3 gap-md">
        <div class="bg-surface-container-low p-md rounded-xl text-center">
          <p class="text-headline-md font-bold text-primary">${ev.total_tickets}</p>
          <p class="text-label-caps text-on-surface-variant mt-1">CAPACITY</p>
        </div>
        <div class="bg-surface-container-low p-md rounded-xl text-center">
          <p class="text-headline-md font-bold text-primary">${ev.tickets_sold}</p>
          <p class="text-label-caps text-on-surface-variant mt-1">SOLD</p>
        </div>
        <div class="bg-surface-container-low p-md rounded-xl text-center">
          <p class="text-headline-md font-bold ${sold ? 'text-error' : 'text-green-600'}">${ev.tickets_remaining}</p>
          <p class="text-label-caps text-on-surface-variant mt-1">AVAILABLE</p>
        </div>
      </div>
    </section>`;
  document.getElementById('content').classList.remove('hidden');

  // Buy bar
  document.getElementById('buy-price').textContent = fmtPrice(ev.price);
  document.getElementById('tickets-left-label').textContent = sold ? '😞 Sold Out' : `${ev.tickets_remaining} remaining`;
  document.getElementById('buy-btn').disabled = sold;
  if (sold) document.getElementById('buy-btn').textContent = 'SOLD OUT';
  document.getElementById('buy-bar').classList.remove('hidden');
}

async function handleBuy() {
  if (!isLoggedIn()) { window.location.href = 'login.html'; return; }
  const btn = document.getElementById('buy-btn');
  btn.textContent = 'PROCESSING…'; btn.disabled = true;
  try {
    const ticket = await purchaseTicket(eventId);
    document.getElementById('modal-msg').textContent = `Your ticket for "${ticket.event.title}" is confirmed! Check My Tickets for your QR code.`;
    document.getElementById('modal').classList.remove('hidden');
    btn.textContent = '✅ TICKET PURCHASED'; btn.disabled = true;
  } catch(e) {
    const msg = e.event?.[0] || e.detail || 'Something went wrong. Please try again.';
    document.getElementById('err-modal-msg').textContent = msg;
    document.getElementById('err-modal').classList.remove('hidden');
    btn.textContent = 'GET TICKET'; btn.disabled = false;
  }
}

function shareEvent() {
  if (navigator.share && eventData) {
    navigator.share({ title: eventData.title, url: location.href }).catch(() => {});
  } else {
    navigator.clipboard.writeText(location.href).then(() => alert('Link copied!'));
  }
}
</script>
</body></html>
